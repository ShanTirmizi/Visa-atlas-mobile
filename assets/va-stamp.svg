<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Warm cream paper background — matches the in-app surface so the icon
       blends with the wider design language and reads well on iOS / Android
       home screens (white-bg icons look weird against most wallpapers). -->
  <rect width="1024" height="1024" fill="#F5EFE6"/>
  <defs>
    <!-- Top arc — text reads left-to-right along the upper half. -->
    <path id="topArc" d="M 102 512 A 410 410 0 0 1 922 512"/>
    <!-- Bottom arc — text reads left-to-right along the lower half. -->
    <path id="bottomArc" d="M 102 512 A 410 410 0 0 0 922 512"/>
  </defs>

  <!-- Outer ring (was r-2 → 510 in the component; scaled to 1024). -->
  <circle cx="512" cy="512" r="492" fill="none" stroke="#C4684A" stroke-width="16"/>
  <!-- Inner concentric ring (was r-8 → 504; thinner, half-opacity). -->
  <circle cx="512" cy="512" r="442" fill="none" stroke="#C4684A" stroke-width="8" opacity="0.6"/>

  <!-- VISA · ATLAS · INT'L · ON FILE around the top arc -->
  <text fill="#C4684A" font-family="'Menlo', 'Courier New', monospace" font-size="58" font-weight="600" letter-spacing="6" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">VISA · ATLAS · INT'L · ON FILE</textPath>
  </text>
  <!-- EST · 2026 · GLOBAL around the bottom arc -->
  <text fill="#C4684A" font-family="'Menlo', 'Courier New', monospace" font-size="58" font-weight="600" letter-spacing="6" text-anchor="middle">
    <textPath href="#bottomArc" startOffset="50%">EST · 2026 · GLOBAL</textPath>
  </text>

  <!-- Big italic VA monogram at the centre — the icon's reading anchor. -->
  <text x="512" y="604" fill="#C4684A" font-family="Georgia, 'Times New Roman', serif" font-size="307" font-weight="700" font-style="italic" text-anchor="middle">VA</text>

  <!-- Tiny coral dots flanking the monogram for the editorial detail. -->
  <circle cx="307" cy="553" r="14" fill="#E89B7A"/>
  <circle cx="717" cy="553" r="14" fill="#E89B7A"/>
</svg>
